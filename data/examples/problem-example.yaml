prompt_latex: |
  Let $f(x)=x^2$. Which function represents a vertical shift of $f$ up by 3 units?

answer: |
  x^2 + 3

distractors:
  - x^2 - 3
  - (x+3)^2
  - (x-3)^2

solution_latex: |
  A vertical shift up by 3 adds 3 to the output of the function, so the new function is
  \[
  f(x)+3 = x^2+3.
  \]

